# Docker-compose equivalent of podman-compose.yml. See that file for the
# full rationale; this one mirrors it exactly but uses the features
# docker-compose supports (container_name, depends_on health conditions).

services:
  postgres:
    # Custom image = official postgres:16 + pg_partman + pg_cron. See
    # docker/postgres/Dockerfile. We need both extensions because V3
    # (db/migration/V3__partition_by_created_at.sql) registers partitioned
    # parents with pg_partman and schedules nightly maintenance via pg_cron.
    build: ./docker/postgres
    image: orchestrator-postgres:16
    container_name: orchestrator-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    # shared_preload_libraries MUST be set before the server starts — that is
    # why we pass it via `command` (which becomes postgres' CLI args) rather
    # than a post-boot ALTER SYSTEM. cron.database_name tells pg_cron which
    # database to install its catalog into (single-database extension).
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron,pg_partman_bgw"
      - "-c"
      - "cron.database_name=orchestrator"
    volumes:
      # Schema is owned by Flyway (V3) — the initdb scripts shipped inside the
      # image only prepare the `partman` schema so V3's CREATE EXTENSION works.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: orchestrator-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Dual listener:
      #   PLAINTEXT_HOST (9092)  — host clients (app on the dev laptop, kcat)
      #   PLAINTEXT      (29092) — intra-compose-network clients (kafka-init)
      KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:9093,PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    depends_on:
      postgres:
        condition: service_healthy

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: orchestrator-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for Kafka at kafka:29092 ..."
        for i in $$(seq 1 60); do
          if kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1; then
            echo "Kafka is up."
            break
          fi
          sleep 2
        done

        echo "Creating topics (idempotent)..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic task.command             --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic notification.management  --partitions 3 --replication-factor 1

        echo "Current topics:"
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

volumes:
  pgdata:
