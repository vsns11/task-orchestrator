# Testcontainers configuration.
#
# For Docker: works out of the box, no config needed.
#
# For Podman: set DOCKER_HOST before running tests:
#   export DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock   (Linux)
#   export DOCKER_HOST=unix://$HOME/.local/share/containers/podman/machine/podman.sock  (macOS)
#
# Or uncomment below to use Podman socket on Linux:
# docker.host=unix:///run/user/1000/podman/podman.sock

# Use ryuk (resource reaper) — set to false if Podman has issues with it
testcontainers.reuse.enable=true
