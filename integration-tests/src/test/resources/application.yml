# Integration test configuration
# Datasource and Kafka bootstrap-servers are injected by TestcontainersConfig

spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    consumer:
      group-id: task-orchestrator-test
      auto-offset-reset: earliest

orchestrator:
  topics:
    task-command: task.command
    notification-management: notification.management
  dag:
    location: classpath:dag/
  tmf701:
    base-url: http://localhost:8080/mock/tmf701
  actionregistry:
    base-url: http://localhost:8080/mock/actionregistry
    action-codes-path: /action-codes
    dcx-action-codes-path: /dcx-action-codes
  mock:
    enabled: true

server:
  port: 0

logging:
  level:
    ca.siva.orchestrator: INFO
    org.apache.kafka: ERROR
    kafka: ERROR
    state.change.logger: ERROR
