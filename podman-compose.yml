# Podman-compatible compose file.
# Usage: podman compose -f podman-compose.yml up -d
#
# What this starts:
#   - postgres     (orchestrator DB — schema pre-loaded from V1__init.sql)
#   - kafka        (single-node KRaft broker)
#   - kafka-init   (one-shot — creates task.command + notification.management
#                   topics, then exits)
#
# Differences from a typical docker-compose:
#   - No depends_on health conditions (podman-compose v1 doesn't support them)
#   - No container_name (podman generates names automatically)
#
# Kafka listeners:
#   - Host clients (the app running on Windows, kcat on your laptop)
#       → localhost:9092
#   - Containers on this compose network (kafka-init, or anything else
#     you add later)
#       → kafka:29092

services:
  postgres:
    image: docker.io/postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Postgres runs every *.sql in /docker-entrypoint-initdb.d ONCE, only
      # when the data volume is empty (i.e. first boot). We reuse the same
      # V1 migration that Flyway uses — one source of truth for the schema.
      # To re-seed: `podman compose down -v` (drops the volume) then `up`.
      - ./task-orchestrator-app/src/main/resources/db/migration/V1__init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: docker.io/confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Three listeners:
      #   CONTROLLER (9093)    — internal KRaft controller traffic
      #   PLAINTEXT  (29092)   — intra-compose-network clients (uses DNS name 'kafka')
      #   PLAINTEXT_HOST (9092) — clients outside the VM (Windows host)
      KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:9093,PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Auto-create is off intentionally — we create topics deliberately in
      # kafka-init below so you get the right partition count / config.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  # One-shot sidecar. Waits for Kafka to accept connections, then creates
  # the two topics the orchestrator uses (idempotent — safe to re-run).
  # Exits when done; `podman ps` won't show it after a few seconds.
  kafka-init:
    image: docker.io/confluentinc/cp-kafka:7.6.0
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for Kafka broker at kafka:29092 ..."
        for i in $$(seq 1 60); do
          if kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1; then
            echo "Kafka is up."
            break
          fi
          sleep 2
        done

        echo "Creating topics (idempotent)..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic task.command             --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic notification.management  --partitions 3 --replication-factor 1

        echo "Current topics:"
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

volumes:
  pgdata:
