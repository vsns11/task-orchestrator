# ===================================================================
# Orchestrator Domain Configuration
# Activated via: -Dspring.profiles.active=orchestration
# ===================================================================

spring:
  config:
    activate:
      on-profile: orchestration

orchestrator:
  # Shared FID (Federated Identity) service-account credentials. The values
  # themselves live in the process environment — the yml only references them
  # via Spring property placeholders. Both the action-registry and TMF-701
  # clients read this single binding (FidCredentialsProperties) so rotating
  # the env var is enough; no code change, no duplicate config.
  #
  # Unset or blank env vars resolve to empty strings here, which disables the
  # Authorization header in the clients (useful locally and in tests).
  fid:
    username: ${FID_USERNAME:}
    password: ${FID_PASSWORD:}

  dag:
    location: classpath:dag/
  tmf701:
    base-url: http://localhost:8080/mock/tmf701
    process-flow-path: /processFlow/{id}
  actionregistry:
    base-url: http://localhost:8080/mock/actionregistry
    action-codes-path: /action-codes
    dcx-action-codes-path: /dcx-action-codes
    reload-cron: "0 0 2 * * *"
