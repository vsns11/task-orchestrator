# ===================================================================
# Orchestrator Domain Configuration
# Activated via: -Dspring.profiles.active=orchestration
# ===================================================================

spring:
  config:
    activate:
      on-profile: orchestration

# Basic-auth credentials for the action-registry and TMF-701 HTTP clients
# are NOT bound in yml. They are read at runtime directly from the process
# environment via BasicAuthSupport.fidHeader():
#
#   FID_USERNAME  — Basic-auth username (shared FID service account)
#   FID_PASSWORD  — Basic-auth password
#
# Blank/unset env vars disable the Authorization header entirely, which is
# the default locally (the in-process mocks accept anonymous traffic) and in
# integration tests.

orchestrator:
  dag:
    location: classpath:dag/
  tmf701:
    base-url: http://localhost:8080/mock/tmf701
    process-flow-path: /processFlow/{id}
  actionregistry:
    base-url: http://localhost:8080/mock/actionregistry
    action-codes-path: /action-codes
    dcx-action-codes-path: /dcx-action-codes
    reload-cron: "0 0 2 * * *"
