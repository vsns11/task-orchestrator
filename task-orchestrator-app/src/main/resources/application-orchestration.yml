# ===================================================================
# Orchestrator Domain Configuration
# Activated via: -Dspring.profiles.active=orchestration
# ===================================================================

spring:
  config:
    activate:
      on-profile: orchestration

orchestrator:
  # Shared FID (Federated Identity) service-account credentials. The values
  # themselves live in the process environment — the yml only references them
  # via Spring property placeholders. Both the action-registry and TMF-701
  # clients read this single binding (FidCredentialsProperties) so rotating
  # the env var is enough; no code change, no duplicate config.
  #
  # Unset or blank env vars resolve to empty strings here, which disables the
  # Authorization header in the clients (useful locally and in tests).
  fid:
    username: ${FID_USERNAME:}
    password: ${FID_PASSWORD:}

  # HTTP client tuning shared by EVERY outbound REST caller
  # (TMF-701, action registry). Binding:
  # ca.siva.orchestrator.config.HttpClientProperties.
  #
  # Any key below can be omitted — the record applies its defaults. Values
  # shown here are operator-tuned; uncomment / override to change.
  http:
    # JDK HttpClient connect timeout (TCP handshake). Default: 120s.
    # Spring Duration parser — accepts 30s, PT5M, 1500ms, 1200s, etc.
     connect-timeout: 120
    #
    # Per-request read timeout (server silent after first byte). Default: 120s.
     read-timeout: 120
    #
    # HTTP status codes that trigger the shared RetryTemplate. Default:
    #   [408, 429, 500, 502, 503, 504]
    # i.e. the RFC-transient 4xx pair plus the common 5xx family. Remove or
    # add codes here without recompiling — both Tmf701Client and ActionRegistry
    # translate matching responses into the retry-friendly marker.
     retryable-statuses:
       - 408
       - 429
       - 500
       - 502
       - 503
       - 504
    #
    # Retry budget for the shared RetryTemplate. Every knob is optional —
    # HttpClientProperties.Retry applies the documented defaults when absent.
    # retry:
    #   # TOTAL attempts (Spring Retry semantics), NOT retry count:
    #   # max-attempts: 3 → 1 initial call + 2 retries.
    #   # Values < 1 snap back to the default.
    #   max-attempts: 3
    #   # First inter-attempt wait. Spring Duration parser — 500ms, PT0.5S, etc.
    #   initial-backoff: 500ms
    #   # Upper bound on the growing wait. Once delay_n hits this cap,
    #   # every subsequent retry waits exactly this long.
    #   max-backoff: 4s
    #   # Exponential growth factor:
    #   #   delay_n = min(initialBackoff * multiplier^(n-1), maxBackoff)
    #   # Values ≤ 1.0 snap to the default (flat/shrinking backoff is almost
    #   # always a misconfiguration).
    #   multiplier: 2.0

  dag:
    location: classpath:dag/
  tmf701:
    base-url: http://localhost:8080/mock/tmf701
    process-flow-path: /processFlow/{id}
  actionregistry:
    base-url: http://localhost:8080/mock/actionregistry
    action-codes-path: /action-codes
    dcx-action-codes-path: /dcx-action-codes
    reload-cron: "0 0 2 * * *"
    # Allowlist of actionNames that MUST be present in the action-code registry
    # at the FIRST load (ApplicationReadyEvent). If any entry is missing, the
    # JVM exits so the pod manager restarts rather than serving traffic with
    # an incomplete registry. Scheduled reloads never consult this list.
    # Add/remove entries here — no code change needed.
    required-action-names:
      # 1000 series — ticketing, MOI, diagnostics, decisions
      - FindTroubleTicket
      - RetrieveTroubleTicket
      - SubmitTroubleTicket
      - ModifyTroubleTicket
      - MOI
      - Internet Service Diagnostic
      - Voice Service Diagnostic
      - Find Device Configuration (Banding Table)
      - ACUT Orchestrator
      - Dispatch Decision
      - FSAI TTD Selector
      - Retrieve Voice Service Diagnostic
      - AD User Validation
      - AD Duplicate Check
      - ACUT Categorize Decision
      - ACUT Check Pattern
      - CNP Outage Check
      - ACUT Check Pattern Parallel
      - FSBI Alert
      # 2000 series — remediation
      - Create Service Problem
      - Fix/Correct BRAS Config
      - Build VCC 35/36
      - Port Reset
      - Correct FEC
      - FTTN/Change speed profile
      - SpeedOptimizerAPI
      - FSAI FTTH Change Speed Profile
      - FSAI Copper Speed Optimizer
      # 3000 series — modem / ONT lifecycle
      - Modem Speed Test
      - Audit, Clean and Rebuild ONT Port
      - Modem Online
      - Modem Factory Reset
      - ONT Reset
      - ATA MAC Address Change
      - ATA Voice Reprovisioning
      - ATA MAC Address Change Parallel
      - Voice Reprovisioning
      - Modem Online Loop
      - Reboot Sequence
      - Speed Test Orchestrator
      - STB Reboot Sequence
      - Modem Reboot
      - FSAI Modem Reboot
      - STB Online
      - Modem Firmware Update
      - Modem Firmware Update Sequence
      - Firmware Check
      - Modem Mailout
      - Find Modem Mailout
      - Email Pickup Modem In Store
      - STB Reboot
      - STB Reset
      - Clean ONT
      - Create ONT
      - Add HSI
      - Add Multiservice
      - Set Advance WiFi On
      - Set Advance WiFi Off
      - CPM
      # Investigators / diagnostics
      - IM Test Result KPI Investigator
      - IM Consumer Device Investigator
      - IM QoS Investigator
      - IM Service Summary Investigator
      - IM GIN Investigator
      - FSAI Mariner Investigator Task
      - Merlin Diagnostic Test
      - Merlin Historical
      # POD / device-QoE
      - View POD
      - Access POD
      - Device QoE
      - Node QoE
      - Locate POD
      # 6000 series — CDA manual reboots / recommendations
      - CDA Manual Reboot 6010
      - CDA Manual Reboot 6011
      - CDA Manual Reboot 6012
      - CDA Manual Reboot 6013
      - CDA Manual Reboot 6014
      - CDA Manual Reboot 6080
      - CDA Manual STB Reboot 6852
      - CDA Manual STB Reboot 6896
      - CDA Recommend to perform Correct FEC
      - Recommend to perform Modem Optimize Speed
      - Did this resolve your issue?
      - AR available
      - What's the problem ?
      # 7000 series — VR / dispatch / kickout outcomes
      - VR Success
      - VR Failure Generic Kickout
      - Dispatch Already Booked
      - Active outage (CNP or ACUT PATTERN)
      - Dispatch Required
      - Existing ACUT Ticket in play
      - Account not found in MOI inventory
      - Max FSBI Step Limits
      - Modem Reboot failure
      - STB Reboot failure
      - Outside Hardware Check failure
      - Speed Test failure
      - Voice/VOIP Re-provisioning Failure
      - Modem Mailout Kickout
