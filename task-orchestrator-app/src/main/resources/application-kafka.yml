# ===================================================================
# Kafka Configuration
# Activated via: -Dspring.profiles.active=kafka
# ===================================================================

spring:
  config:
    activate:
      on-profile: kafka

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:task-orchestrator}
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        max.poll.records: 50
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
        fetch.min.bytes: 1024
        fetch.max.wait.ms: 500
    producer:
      acks: all
      # Compression + small linger + larger batches cut network I/O and
      # broker ingest load materially for JSON bodies. snappy gets ~70%
      # compression on TaskCommand envelopes at negligible CPU cost;
      # linger=10ms + batch=32KB lets the producer coalesce bursts without
      # adding meaningful p99 latency.
      compression-type: snappy
      batch-size: 32768
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 3
        delivery.timeout.ms: 30000
        linger.ms: 10
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: ${KAFKA_CONCURRENCY:3}

# Kafka topic names — orchestrator listens on a SINGLE topic.
# notification.management is a pamconsumer concern and is configured in the
# mock-pamconsumer module (pamconsumer.notification-topic) — not here.
orchestrator:
  topics:
    task-command: task.command
