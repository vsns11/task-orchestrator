# ===================================================================
# Kafka Configuration
# Activated via: -Dspring.profiles.active=kafka
# ===================================================================

spring:
  config:
    activate:
      on-profile: kafka

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:task-orchestrator}
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        max.poll.records: 50
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
        fetch.min.bytes: 1024
        fetch.max.wait.ms: 500
    producer:
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 3
        delivery.timeout.ms: 30000
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: ${KAFKA_CONCURRENCY:3}
      # Topics are provisioned externally by the platform team. Do not abort startup
      # if a topic is momentarily missing during a deploy — let the consumer retry.
      missing-topics-fatal: false

# Kafka topic names
orchestrator:
  topics:
    task-command: task.command
    notification-management: notification.management
