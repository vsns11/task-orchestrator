# ===================================================================
# Task Orchestrator - Main Configuration
# ===================================================================
# Profile-based config files (activated via JVM arg -Dspring.profiles.active):
#   application-db.yml            - PostgreSQL, JPA, Flyway
#   application-kafka.yml         - Kafka broker, topics
#   application-orchestration.yml - DAG, TMF-701, action-registry, task-runner retry
#
# Example: java -Dspring.profiles.active=db,kafka,orchestration -jar app.jar
# ===================================================================

spring:
  application:
    name: task-orchestrator
  lifecycle:
    # On SIGTERM, stop accepting new requests and wait up to 30s for in-flight work
    # (Kafka consumers, HTTP requests, DB transactions) to complete before forcing shutdown.
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # Expose component details so monitoring can distinguish db-down vs kafka-down
      show-details: always
      show-components: always
      probes:
        enabled: true
      group:
        # Kubernetes liveness: is the JVM alive? Only fails on deadlock/OOM.
        liveness:
          include: livenessState
        # Kubernetes readiness: can we accept traffic? Includes db + kafka + custom indicators.
        readiness:
          include: readinessState, db, kafka, actionRegistry, dagRegistry
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    ca.siva.orchestrator: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
