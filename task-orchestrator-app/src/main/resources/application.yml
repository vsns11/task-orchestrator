# ===================================================================
# Task Orchestrator - Main Configuration
# ===================================================================
# Profile-based config files (activated via JVM arg -Dspring.profiles.active):
#   application-db.yml            - PostgreSQL, JPA, Flyway
#   application-kafka.yml         - Kafka broker, topics
#   application-orchestration.yml - DAG, TMF-701, action-registry
#
# Example: java -Dspring.profiles.active=db,kafka,orchestration -jar app.jar
# ===================================================================

spring:
  application:
    name: task-orchestrator

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      # Only expose the minimum set needed by ops + Kubernetes probes.
      # /actuator/health/liveness and /actuator/health/readiness are the
      # canonical probe endpoints; /livez and /readyz below are aliases.
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      # Hide component breakdowns from unauthenticated callers (e.g. anyone
      # who can hit /actuator/health). Internal tooling with auth still sees
      # full detail. Use "always" only if the management port is isolated.
      show-details: when-authorized
      show-components: when-authorized
      probes:
        # Exposes /actuator/health/liveness and /actuator/health/readiness.
        enabled: true
        # Adds Kubernetes-style shortcuts: /livez and /readyz.
        add-additional-paths: true
      group:
        # Liveness: "is the JVM alive?" — MUST NOT depend on external systems,
        # otherwise a Kafka blip or DB failover would make Kubernetes kill
        # the pod. Only livenessState (trips on OutOfMemoryError / deadlock).
        liveness:
          include: livenessState
        # Readiness: "can this pod accept traffic right now?" — aggregates
        # everything we need at steady state: DB reachable, Kafka reachable,
        # and the two startup registries are populated. The registry names
        # below are the suffix-stripped bean names registered by
        # RegistryHealthIndicators (actionRegistryHealthIndicator ->
        # actionRegistry; dagRegistryHealthIndicator -> dagRegistry).
        readiness:
          include: readinessState, db, kafka, actionRegistry, dagRegistry
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    # Disk space checks flip the overall health status to DOWN on low disk,
    # which would make the pod un-ready even when everything it needs to
    # serve traffic is fine. Monitor disk via the platform, not the probe.
    diskspace:
      enabled: false

logging:
  level:
    ca.siva.orchestrator: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
